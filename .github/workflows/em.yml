name: EmmaMason Algolia Scraper (Matrix Chunked)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # 204,418 products ≈ 2045 pages (100 per page)
          # 10 parallel jobs
          MATRIX="["
          for i in {0..9}; do
            MATRIX+="{\"chunk_index\":$i},"
          done
          MATRIX="${MATRIX%,}]"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix: $MATRIX"

  scrape:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}

    env:
      CHUNK_INDEX: ${{ matrix.chunk_index }}
      CHUNK_SIZE: 205   # ~2045 pages / 10 jobs
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper (chunk)
        run: |
          echo "Running chunk index: $CHUNK_INDEX"
          python drl/em_algolia_fetch.py \
            --hits-per-page 100 \
            --max-workers 16 \
            --delay 0 \
            --retries 3 \
            --timeout 60

      - name: Upload chunk CSV
        uses: actions/upload-artifact@v4
        with:
          name: chunk_${{ matrix.chunk_index }}
          path: products_chunk_*.csv

  merge:
    needs: scrape
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          path: chunks
          pattern: chunk_*
          merge-multiple: true

      - name: Merge CSV files
        run: |
          FILES=$(find chunks -name "products_chunk_*.csv")
          if [ -z "$FILES" ]; then
            echo "No files found"
            exit 1
          fi

          FIRST=$(echo "$FILES" | head -n 1)
          head -n 1 "$FIRST" > products_full.csv

          for f in $FILES; do
            tail -n +2 "$f" >> products_full.csv
          done

          ROWS=$(tail -n +2 products_full.csv | wc -l)
          echo "Total merged rows: $ROWS"

      - name: Upload final CSV
        uses: actions/upload-artifact@v4
        with:
          name: emmamason_full
          path: products_full.csv